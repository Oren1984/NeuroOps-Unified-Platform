server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # SPA fallback — every route that doesn't match a real file
    # is served the index.html so React Router handles it client-side
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # Static asset caching — Vite fingerprints filenames so we can cache
    # aggressively
    # -------------------------------------------------------------------------
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html must never be cached so the browser always gets the latest
    # entry point with correct asset fingerprints
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # -------------------------------------------------------------------------
    # Gzip
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    # Allow the page to embed Streamlit apps via iframes from the same origin
    add_header Content-Security-Policy "frame-ancestors 'self'" always;
}
