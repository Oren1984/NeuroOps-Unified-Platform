# =============================================================================
# NeuroOps Unified Platform — Nginx Reverse Proxy Configuration
# =============================================================================
# PRODUCTION vs DEVELOPMENT:
#   Production:  The frontend block proxies to the nginx static container
#                (apps/unified-frontend built image serves /usr/share/nginx/html).
#                No change needed — just build the frontend image.
#
#   Development: Replace the frontend upstream with `server frontend:5173`
#                and uncomment the Vite WebSocket/HMR headers in the `/`
#                location block below.  Alternatively run:
#                  docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#                which overrides the frontend service to run `npm run dev`.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # Buffer sizes
    client_body_buffer_size     128k;
    client_max_body_size        50m;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 16k;

    # Proxy buffers
    proxy_buffer_size           16k;
    proxy_buffers               8 16k;
    proxy_busy_buffers_size     32k;

    # Timeouts
    proxy_connect_timeout       10s;
    proxy_send_timeout          60s;
    proxy_read_timeout          60s;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # -------------------------------------------------------------------------
    # Upstreams
    # -------------------------------------------------------------------------
    upstream frontend {
        server frontend:80;
        # DEV MODE: change to `server frontend:5173;` when running Vite dev server
    }

    upstream gateway_api {
        server gateway-api:8000;
    }

    upstream autopilot_api {
        server autopilot-api:8000;
    }

    upstream control_room_api {
        server control-room-api:8000;
    }

    upstream live_control_api {
        server live-control-api:8000;
    }

    upstream incident_replay_api {
        server incident-replay-api:8000;
    }

    upstream warehouse_api {
        server warehouse-api:8000;
    }

    upstream career_agent {
        server career-agent:8501;
    }

    upstream insight_engine {
        server insight-engine:8501;
    }

    upstream warehouse_copilot {
        server warehouse-copilot:8501;
    }

    # -------------------------------------------------------------------------
    # Shared header snippets (defined inline per location for compatibility
    # with nginx:alpine which doesn't load conf.d snippets by default)
    # -------------------------------------------------------------------------

    server {
        listen 80;
        server_name _;

        # -----------------------------------------------------------------
        # Security headers (applied globally, overridden per section)
        # -----------------------------------------------------------------
        add_header X-Content-Type-Options  "nosniff"        always;
        add_header X-XSS-Protection        "1; mode=block"  always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # -----------------------------------------------------------------
        # Gateway API  →  /api/gateway/
        # -----------------------------------------------------------------
        location /api/gateway/ {
            rewrite ^/api/gateway/(.*)$ /$1 break;

            proxy_pass         http://gateway_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # -----------------------------------------------------------------
        # Autopilot API  →  /api/autopilot/
        # -----------------------------------------------------------------
        location /api/autopilot/ {
            rewrite ^/api/autopilot/(.*)$ /$1 break;

            proxy_pass         http://autopilot_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # -----------------------------------------------------------------
        # Control Room API  →  /api/control-room/
        # -----------------------------------------------------------------
        location /api/control-room/ {
            rewrite ^/api/control-room/(.*)$ /$1 break;

            proxy_pass         http://control_room_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # -----------------------------------------------------------------
        # Live Control API  →  /api/live-control/
        # -----------------------------------------------------------------
        location /api/live-control/ {
            rewrite ^/api/live-control/(.*)$ /$1 break;

            proxy_pass         http://live_control_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # -----------------------------------------------------------------
        # Incident Replay API  →  /api/incident-replay/
        # -----------------------------------------------------------------
        location /api/incident-replay/ {
            rewrite ^/api/incident-replay/(.*)$ /$1 break;

            proxy_pass         http://incident_replay_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # -----------------------------------------------------------------
        # Warehouse API  →  /api/warehouse/
        # -----------------------------------------------------------------
        location /api/warehouse/ {
            rewrite ^/api/warehouse/(.*)$ /$1 break;

            proxy_pass         http://warehouse_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # -----------------------------------------------------------------
        # Career Agent (Streamlit)  →  /embed/career-agent/
        # WebSocket required for Streamlit interactive components
        # -----------------------------------------------------------------
        location /embed/career-agent/ {
            rewrite ^/embed/career-agent/(.*)$ /$1 break;

            proxy_pass         http://career_agent;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;

            # Allow embedding in iframes from same origin
            # (X-Frame-Options deliberately omitted so iframes work)
            add_header Content-Security-Policy "frame-ancestors 'self'" always;
        }

        # -----------------------------------------------------------------
        # Insight Engine (Streamlit)  →  /embed/insight-engine/
        # -----------------------------------------------------------------
        location /embed/insight-engine/ {
            rewrite ^/embed/insight-engine/(.*)$ /$1 break;

            proxy_pass         http://insight_engine;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;

            add_header Content-Security-Policy "frame-ancestors 'self'" always;
        }

        # -----------------------------------------------------------------
        # Warehouse Copilot (Streamlit)  →  /embed/warehouse-copilot/
        # -----------------------------------------------------------------
        location /embed/warehouse-copilot/ {
            rewrite ^/embed/warehouse-copilot/(.*)$ /$1 break;

            proxy_pass         http://warehouse_copilot;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;

            add_header Content-Security-Policy "frame-ancestors 'self'" always;
        }

        # -----------------------------------------------------------------
        # Unified Frontend  →  /
        #
        # PRODUCTION: proxies to the static nginx container (frontend:80)
        #             built from apps/unified-frontend/Dockerfile.
        #
        # DEVELOPMENT: change upstream `frontend` to `server frontend:5173`
        #              and uncomment the Vite HMR WebSocket headers below.
        # -----------------------------------------------------------------
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # --- Uncomment for Vite HMR (dev mode only) ---
            # proxy_set_header Upgrade     $http_upgrade;
            # proxy_set_header Connection  "upgrade";

            proxy_read_timeout 60s;
        }

        # -----------------------------------------------------------------
        # Error pages
        # -----------------------------------------------------------------
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
