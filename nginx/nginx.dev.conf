# =============================================================================
# NeuroOps — Development Nginx Frontend Upstream Override
# Mounted by docker-compose.dev.yml to redirect the `frontend` upstream
# from the production nginx:80 static container to the Vite dev server.
#
# NOTE: nginx does not support runtime upstream overrides via conf.d when the
# upstream is defined in the main nginx.conf.  The cleanest dev workflow is:
#
#   Option A (recommended): run the Vite dev server on the HOST at port 5173
#   and access it directly at http://localhost:5173.  The API calls go through
#   Vite's proxy config (vite.config.ts).
#
#   Option B: Use this file as a reference and manually edit nginx/nginx.conf
#   `upstream frontend` to point to `server frontend:5173` during development,
#   then revert before committing.
#
#   Option C (this file): If your nginx build supports the `include` directive
#   inside the `http {}` block for upstream overrides, mount this file and
#   ensure the main nginx.conf does NOT define the `frontend` upstream so this
#   file can define it instead.
# =============================================================================
#
# To use Option C: remove or comment out `upstream frontend` in nginx.conf,
# then this file takes effect:

upstream frontend {
    server frontend:5173;
    # Vite dev server with HMR on port 5173
}
